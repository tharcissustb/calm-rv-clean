dataset:
  name: pheme
  path: data/pheme.jsonl
  event_field: event_id
  text_field: text
  label_field: label

model:
  name: roberta-base
  num_labels: 3
  max_length: 256

training:
  batch_size: 16
  lr: 2e-5
  epochs: 5
  seed: 42
  fp16: false

evaluation:
  type: loeo

output:
  dir: outputs/runs